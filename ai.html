<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - Hard Mode</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h2 { margin-bottom: 10px; color: #e74c3c; } /* Red for difficulty */
        p { font-size: 0.9rem; margin-bottom: 20px; }

        canvas {
            background-color: #34495e;
            border: 4px solid #e74c3c;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: none;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #18bc9c;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Pong: Hard Mode</h2>
    <p>The ball speeds up significantly with every hit. Good luck!</p>

    <canvas id="pongCanvas" width="800" height="400"></canvas>

    <div class="controls">
        <a href="fromScratch.html" class="back-link">← Back to Photography Page</a>
    </div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");

        // Game Objects - Adjusted for difficulty
        const ball = { 
            x: canvas.width/2, 
            y: canvas.height/2, 
            radius: 8, 
            speed: 8,  // Increased from 5
            dx: 8, 
            dy: 8, 
            color: "#ffffff" 
        };

        const user = { x: 0, y: canvas.height/2 - 40, width: 10, height: 80, score: 0, color: "#18bc9c" };
        const ai = { x: canvas.width - 10, y: canvas.height/2 - 40, width: 10, height: 80, score: 0, color: "#e74c3c" };

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2, false);
            ctx.closePath();
            ctx.fill();
        }

        function drawText(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = "45px Arial";
            ctx.fillText(text, x, y);
        }

        canvas.addEventListener("mousemove", (evt) => {
            let rect = canvas.getBoundingClientRect();
            user.y = evt.clientY - rect.top - user.height/2;
        });

        function collision(b, p) {
            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;
            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;
            return b.right > p.left && b.bottom > p.top && b.left < p.right && b.top < p.bottom;
        }

        function resetBall() {
            ball.x = canvas.width/2;
            ball.y = canvas.height/2;
            ball.speed = 8; // Reset to higher base speed
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
        }

        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Faster AI tracking - increased from 0.08 to 0.15
            ai.y += (ball.y - (ai.y + ai.height/2)) * 0.15;

            if(ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            let player = (ball.x < canvas.width/2) ? user : ai;

            if(collision(ball, player)) {
                let collidePoint = ball.y - (player.y + player.height/2);
                collidePoint = collidePoint / (player.height/2);
                let angleRad = collidePoint * (Math.PI/4);
                let direction = (ball.x < canvas.width/2) ? 1 : -1;

                ball.dx = direction * ball.speed * Math.cos(angleRad);
                ball.dy = ball.speed * Math.sin(angleRad);
                
                // Aggressive acceleration - increased from 0.2 to 0.6
                ball.speed += 0.6; 
            }

            if(ball.x - ball.radius < 0) {
                ai.score++;
                resetBall();
            } else if(ball.x + ball.radius > canvas.width) {
                user.score++;
                resetBall();
            }
        }

        function render() {
            drawRect(0, 0, canvas.width, canvas.height, "#34495e");
            drawText(user.score, canvas.width/4, canvas.height/5, "rgba(255,255,255,0.3)");
            drawText(ai.score, 3 * canvas.width/4, canvas.height/5, "rgba(255,255,255,0.3)");
            drawRect(user.x, user.y, user.width, user.height, user.color);
            drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);
            drawCircle(ball.x, ball.y, ball.radius, ball.color);
        }

        function game() {
            update();
            render();
        }

        setInterval(game, 1000/60); // Smoother 60 FPS
    </script>
</body>
</html>
